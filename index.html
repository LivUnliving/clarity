<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Clarity</title>
</head>
<body>

    <section id="area-testes">
        <p>⚙️ Configurações (Simulação do Modal)</p>
        <form id="form-link">
            <input type="url" id="urlUsuario" placeholder="Cole o link (Spotify, YT, Apple)" required>
            <button type="submit">Carregar Música</button>
        </form>
    </section>

    <section id="container-do-player">
        </section>

    <script type="module" src="js/main.js"></script>

    <div class="tarefas-container">
        <h2>Tarefas</h2>
        <div id="lista-tarefas" class="scroll-area"></div>
        
        <button id="btn-nova-tarefa">
            <span>+</span> Criar nova tarefa
        </button>
    </div>

    <script src="script.js"></script>

    <nav>
        <img id="logo" src="../assets/img/logo (1).png">
        <button id="configuracoes" onclick="abrirModal()">Configurações</button>
        <img id="conta" src="../assets/img/user.png">
    </nav>
        <div class="modos">
            <button id="btnFoco" class="modo ativo" onclick="mudarModo('foco')">Pomodoro</button>
            <button id="btnPausa" onclick="mudarModo('pausa')">Pausa</button>
        </div>
        <h1 id="timer">25:00</h1>
        <button id="btn" onclick="toggleTimer()">Iniciar</button>

    <dialog id="modal">
        <div class="modal-content">
            <h2>Timer</h2>
            <label>Pomodoro</label>
            <input type="number" id="pomodoroInput" value="25" min="1" max="999">
            <label>Pausa</label>
            <input type="number" id="pausaInput" value="5" min="1" max="999">
            <button onclick="salvar()">Salvar</button>
            <button onclick="fecharModal()">Fechar</button>
        </div>    
    </dialog>
</div>
<script src="../assets/js/script.js"></script>
</body>
</html>
