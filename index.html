<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Clarity</title>
</head>
<body>

    <nav class="cabecalho">
        <img id="logo" src="../assets/img/logo (1).png" alt="Logo Clarity">
        <button id="configuracoes" onclick="abrirModal()">⚙️ Configurações</button>
        <img id="conta" src="../assets/img/user.png" alt="Perfil do Usuário">
    </nav>

    <main class="layout-principal">
        
        <section class="card pomodoro-card">
            <div class="modos">
                <button id="btnFoco" class="modo ativo" onclick="mudarModo('foco')">Pomodoro</button>
                <button id="btnPausa" onclick="mudarModo('pausa')">Pausa</button>
            </div>
            <h1 id="timer">25:00</h1>
            <button id="btn" onclick="toggleTimer()">Iniciar</button>
        </section>

        <div class="coluna-direita">
            
            <div class="card tarefas-container">
                <h2>Tarefas</h2>
                <div id="lista-tarefas" class="scroll-area"></div>
                <button id="btn-nova-tarefa">
                    <span>+</span> Criar nova tarefa
                </button>
            </div>

            <section class="card musica-card" id="container-do-player">
                <h3>Música</h3>
            </section>
            
        </div>
    </main>

    <dialog id="modal">
        <div class="modal-content">
            <button id="btn-fechar-modal" onclick="fecharModal()" title="Fechar">
                <img src="../assets/img/x.png" alt="Fechar" class="icone-fechar">
            </button>
            
        <div class="config-secao">
                <h3>Timer</h3>
                <div class="inputs-lado-a-lado">
                    <div class="input-grupo">
                        <label for="pomodoroInput">Pomodoro</label>
                        <input type="number" id="pomodoroInput" value="25" min="1" max="999">
                    </div>
                    <div class="input-grupo">
                        <label for="pausaInput">Pausa</label>
                        <input type="number" id="pausaInput" value="5" min="1" max="999">
                    </div>
                </div>
                <button class="btn-salvar" onclick="salvar()">Salvar Tempo</button>
            </div>

            <hr class="divisor-modal">

            <div class="config-secao">
                <h3>Trilha Sonora</h3>
                <form id="form-link">
                    <label for="urlUsuario">Link da Playlist ou Vídeo</label>
                    <input type="url" id="urlUsuario" placeholder="Cole o link (Spotify, YT, Apple)" required>
                    <button class="btn-salvar" type="submit">Carregar Música</button>
                </form>
            </div>
        </div>    
    </dialog>

    <script src="script.js"></script> 
    <script src="../assets/js/script.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
